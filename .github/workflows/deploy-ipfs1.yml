name: Deploy to IPFS via Pinata

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout stable tag
        run: git checkout tags/web/5.19.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          REACT_APP_INFURA_KEY: ${{ secrets.REACT_APP_INFURA_KEY }}
          REACT_APP_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          NODE_ENV: production
        run: bun run build
        working-directory: apps/web

      - name: Upload to Pinata
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer ${{ secrets.PINATA_JWT }}" \
            -F "file=@apps/web/dist" \
            -F "pinataMetadata={\"name\":\"uniswap-${{ github.sha }}\"}")
          echo "Pinata response: $RESPONSE"
          CID=$(echo $RESPONSE | grep -o '"IpfsHash":"[^"]*' | cut -d'"' -f4)
          echo "Deployed CID: $CID"
          echo "Live at: https://gateway.pinata.cloud/ipfs/$CID"
