name: Deploy Uniswap to IPFS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Patch package.json
        run: |
          python3 -c "
          import json
          with open('package.json', 'r') as f:
              pkg = json.load(f)
          pkg['workspaces'] = [
              w for w in pkg.get('workspaces', [])
              if w != 'tools/uniswap-nx'
          ]
          with open('package.json', 'w') as f:
              json.dump(pkg, f, indent=2)
          print('Patched. Workspaces:', pkg['workspaces'])
          "

      - name: Setup Node.js 22.22.2
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'

      - name: Install Bun 1.3.11
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Verify versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install

      - name: Create generated folder
        run: mkdir -p apps/web/src/utils/__generated__

      - name: Find and run build script
        working-directory: apps/web
        env:
          REACT_APP_INFURA_KEY: ${{ secrets.REACT_APP_INFURA_KEY }}
          REACT_APP_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          NODE_ENV: production
        run: |
          echo "Available scripts:"
          python3 -c "
          import json
          with open('package.json') as f:
              pkg = json.load(f)
          scripts = pkg.get('scripts', {})
          for k,v in scripts.items():
              print(f'  {k}: {v}')
          "
          if bun run build 2>/dev/null; then
            echo "build succeeded"
          elif bun run build:production 2>/dev/null; then
            echo "build:production succeeded"
          elif bun run compile 2>/dev/null; then
            echo "compile succeeded"
          elif bunx vite build 2>/dev/null; then
            echo "vite build succeeded"
          else
            echo "All build attempts failed"
            exit 1
          fi

      - name: Upload to Pinata
        run: |
          BUILD_DIR=""
          if [ -d "apps/web/dist" ]; then
            BUILD_DIR="apps/web/dist"
          elif [ -d "apps/web/build" ]; then
            BUILD_DIR="apps/web/build"
          elif [ -d "apps/web/out" ]; then
            BUILD_DIR="apps/web/out"
          else
            echo "Could not find build output folder"
            exit 1
          fi
          echo "Found build at: $BUILD_DIR"

          echo "Testing JWT format..."
          JWT="${{ secrets.UNISWAPKEY }}"
          echo "JWT length: ${#JWT}"
          echo "First 20 chars: ${JWT:0:20}"
          echo "Last 10 chars: ${JWT: -10}"

          echo "Uploading to Pinata..."
          RESPONSE=$(curl -s -X POST \
            "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer ${{ secrets.UNISWAPKEY }}" \
            -F "file=@$BUILD_DIR;type=application/octet-stream" \
            -F 'pinataMetadata={"name":"uniswap-${{ github.sha }}"}' \
            -F 'pinataOptions={"cidVersion":1}')
          echo "Pinata response: $RESPONSE"
          CID=$(echo $RESPONSE | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('IpfsHash','ERROR'))")
          echo "================================================"
          echo "CID: $CID"
          echo "URL: https://gateway.pinata.cloud/ipfs/$CID"
          echo "================================================"
