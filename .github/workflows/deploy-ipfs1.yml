name: Deploy Uniswap to IPFS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Patch package.json
        run: |
          python3 -c "
          import json
          with open('package.json', 'r') as f:
              pkg = json.load(f)
          pkg['workspaces'] = [
              w for w in pkg.get('workspaces', [])
              if w != 'tools/uniswap-nx'
          ]
          with open('package.json', 'w') as f:
              json.dump(pkg, f, indent=2)
          print('Patched. Workspaces:', pkg['workspaces'])
          "

      - name: Setup Node.js 22.22.2
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'

      - name: Install Bun 1.3.11
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.11"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Verify versions
        run: |
          node --version
          bun --version

      - name: Install dependencies
        run: bun install

      - name: Create generated folder
        run: mkdir -p apps/web/src/utils/__generated__

      - name: Find and run build script
        working-directory: apps/web
        env:
          REACT_APP_INFURA_KEY: ${{ secrets.REACT_APP_INFURA_KEY }}
          REACT_APP_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          NODE_ENV: production
        run: |
          echo "Available scripts:"
          python3 -c "
          import json
          with open('package.json') as f:
              pkg = json.load(f)
          scripts = pkg.get('scripts', {})
          for k,v in scripts.items():
              print(f'  {k}: {v}')
          "
          if bun run build 2>/dev/null; then
            echo "build succeeded"
          elif bun run build:production 2>/dev/null; then
            echo "build:production succeeded"
          elif bun run compile 2>/dev/null; then
            echo "compile succeeded"
          elif bunx vite build 2>/dev/null; then
            echo "vite build succeeded"
          else
            echo "All build attempts failed"
            exit 1
          fi

      - name: Upload to Pinata
        env:
          PINATA_JWT: ${{ secrets.UNISWAPKEY }}
        run: |
          BUILD_DIR=""
          if [ -d "apps/web/dist" ]; then
            BUILD_DIR="apps/web/dist"
          elif [ -d "apps/web/build" ]; then
            BUILD_DIR="apps/web/build"
          elif [ -d "apps/web/out" ]; then
            BUILD_DIR="apps/web/out"
          else
            echo "Could not find build output folder"
            exit 1
          fi
          echo "Found build at: $BUILD_DIR"
          echo "File count: $(find $BUILD_DIR -type f | wc -l)"
          echo "Total size: $(du -sh $BUILD_DIR | cut -f1)"

          python3 << PYEOF
          import os, json, mimetypes, uuid, urllib.request

          build_dir = "$BUILD_DIR"
          jwt = os.environ["PINATA_JWT"]
          boundary = uuid.uuid4().hex
          body_parts = []

          for root, dirs, files in os.walk(build_dir):
              for fname in sorted(files):
                  fpath = os.path.join(root, fname)
                  rel = os.path.relpath(fpath, build_dir)
                  with open(fpath, "rb") as f:
                      data = f.read()
                  mime = mimetypes.guess_type(fpath)[0] or "application/octet-stream"
                  header = (
                      f"--{boundary}\r\n"
                      f'Content-Disposition: form-data; name="file"; filename="{rel}"\r\n'
                      f"Content-Type: {mime}\r\n\r\n"
                  ).encode()
                  body_parts.append(header + data + b"\r\n")

          meta = json.dumps({"name": "uniswap-frontend"})
          body_parts.append((
              f"--{boundary}\r\n"
              f'Content-Disposition: form-data; name="pinataMetadata"\r\n\r\n'
              f"{meta}\r\n"
          ).encode())
          body_parts.append(f"--{boundary}--\r\n".encode())

          body = b"".join(body_parts)
          print(f"Uploading {len(body_parts)-2} files ({len(body)} bytes) to Pinata...")

          req = urllib.request.Request(
              "https://api.pinata.cloud/pinning/pinFileToIPFS",
              data=body,
              headers={
                  "Authorization": f"Bearer {jwt}",
                  "Content-Type": f"multipart/form-data; boundary={boundary}",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              result = json.loads(e.read())

          cid = result.get("IpfsHash", "ERROR")
          size = result.get("PinSize", 0)
          print("================================================")
          print(f"CID:  {cid}")
          print(f"Size: {size} bytes")
          print(f"URL:  https://gateway.pinata.cloud/ipfs/{cid}")
          print("================================================")
          if cid == "ERROR":
              print("Full response:", result)
              exit(1)
          PYEOF
